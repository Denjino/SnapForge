name: Release

# Builds and publishes SnapForge desktop binaries for macOS and Windows.
# Trigger: push a tag like `v1.0.1`. GitHub Actions will build both platforms
# in parallel and attach the artifacts to a GitHub Release of the same name.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch: # allows manual runs from the Actions tab

permissions:
  contents: write # needed to create the GitHub Release

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            name: macOS
          - os: windows-latest
            name: Windows
    runs-on: ${{ matrix.os }}
    name: Build ${{ matrix.name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        # Use `npm install` (not `npm ci`) so the workflow doesn't require the
        # lockfile to be pre-synced with every dependency change. Safe for a
        # small-team project where exact lockfile reproducibility is less
        # critical than zero-friction releases.
        run: npm install

      - name: Pre-bundle Chromium for Playwright
        # Install Chromium into node_modules/playwright-core/.local-browsers so it
        # ships inside the app and end users don't download 150MB on first launch.
        env:
          PLAYWRIGHT_BROWSERS_PATH: '0'
        run: npx playwright install chromium

      - name: Build Next.js
        run: npm run build

      - name: Build & publish (macOS)
        if: matrix.os == 'macos-latest'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PLAYWRIGHT_BROWSERS_PATH: '0'
        run: npx electron-builder --mac --publish always

      - name: Build & publish (Windows)
        if: matrix.os == 'windows-latest'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PLAYWRIGHT_BROWSERS_PATH: '0'
        run: npx electron-builder --win --publish always
